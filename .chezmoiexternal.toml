# Install oh-my-zsh and the zsh-autosuggestions plugin as managed externals,
# so the framework isn't vendored into this repo. Refreshed weekly.
[".oh-my-zsh"]
    type = "archive"
    url = "https://github.com/ohmyzsh/ohmyzsh/archive/refs/heads/master.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"

[".oh-my-zsh/custom/plugins/zsh-autosuggestions"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-autosuggestions/archive/refs/heads/master.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"
{{- if .installSkills }}

# Private global Claude Code skills, pulled from a separate repo (cloned via SSH, so
# the 1Password agent authenticates). Access still requires being able to clone the
# private repo, so hardcoding the URL here leaks nothing exploitable.
[".claude/skills"]
    type = "git-repo"
    url = "git@github.com:SokolovYaroslav/claude-skills.git"
    refreshPeriod = "168h"
    [".claude/skills".pull]
        args = ["--ff-only"]
{{- end }}
